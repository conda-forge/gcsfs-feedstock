{% set name = "gcsfs" %}
{% set version = "2026.6.0" %}
{% set sha256 = "bfb1f912b3f51006b00bcd5fcef915214cb51f8b892a3974178430a55990ba3f" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatch-vcs

  run:
    - python >={{ python_min }}
    - google-auth >=1.2
    - google-auth-oauthlib
    - google-cloud-storage >=3.9.0
    - google-cloud-storage-control
    - requests
    - decorator >4.1.2
    - fsspec !=2026.6.0,>=2026.6.1
    - aiohttp >=3.9.0

test:
  imports:
    - gcsfs
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/dask/gcsfs
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: Pythonic file-system interface for Google Cloud Storage
  doc_url: http://gcsfs.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - martindurant
    - jcrist
    - tomaugspurger
